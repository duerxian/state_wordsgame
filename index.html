<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>单词表</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="nav">
            <div class="tab-logo">
                <a href="index.html" class="tab active">wordsgame</a>
            </div>
            <div class="tab-container">
                <a href="index.html" class="tab active">单词表</a>
                <a href="wordgame.html" class="tab">单词连连看</a>
                <a href="sentence.html" class="tab">句子练习</a>
            </div>
        </div>
        
        
        <div class="controls">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索单词..." onkeyup="searchWords()">
            </div>
            <div class="action-buttons">
                <button class="add-btn" onclick="exportToExcel()">📥 导出Excel</button>
                <label class="add-btn" style="cursor: pointer;">
                    📤 导入Excel
                    <input type="file" accept=".xlsx,.xls" onchange="importFromExcel(event)" style="display:none;">
                </label>
                <button class="add-btn" onclick="resetToJson()">🔄 重置数据</button>
            </div>
        </div>
        
        <div class="filter-controls">
            <div class="filter-group">
                <label for="gradeFilter">grade:</label>
                <select id="gradeFilter" onchange="applyFilters()">
                    <option value="">无</option>
                    <option value="7上">7上</option>
                    <option value="7下">7下</option>
                    <option value="8上">8上</option>
                    <option value="8下">8下</option>
                    <option value="9上">9上</option>
                    <option value="9下">9下</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="unitFilter">unit:</label>
                <select id="unitFilter" onchange="applyFilters()">
                    <option value="">无</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                    <option value="6">6</option>
                    <option value="7">7</option>
                    <option value="8">8</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="languageFilter">语言:</label>
                <select id="languageFilter" onchange="applyFilters()">
                    <option value="">无</option>
                    <option value="english">英文</option>
                    <option value="meaning">释义</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="posFilter">词性:</label>
                <select id="posFilter" onchange="applyFilters()">
                    <option value="">无</option>
                    <option value="n.">n.</option>
                    <option value="v.">v.</option>
                    <option value="adj.">adj.</option>
                    <option value="adv.">adv.</option>
                    <option value="prep.">prep.</option>
                    <option value="conj.">conj.</option>
                    <option value="pron.">pron.</option>
                    <option value="interj.">interj.</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="sortFilter">排序:</label>
                <select id="sortFilter" onchange="applyFilters()">
                    <option value="id" selected>id</option>
                    <option value="random">随机</option>
                    <option value="az">a-z</option>
                </select>
            </div>
        </div>
        
        <div class="stats">
            <span>总计: <strong id="totalWords">0</strong> 个单词</span>
            <span>待斩杀单词: <strong id="normalWords">0</strong> 个</span>
            <span>已斩杀单词: <strong id="killWords">0</strong> 个</span>
        </div>
        
        <div class="word-container">
            <div class="word-section">
                <h2>待斩杀单词</h2>
                <div class="word-list" id="normalWordContainer">
                    <div class="loading">加载中...</div>
                </div>
            </div>
            <div class="word-section">
                <h2>已斩杀单词</h2>
                <div class="word-list" id="killWordContainer">
                    <div class="loading">加载中...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/main.js" defer></script>
    <div id="wordTooltip" class="word-tooltip">
        <div class="tooltip-content">
            <div class="tooltip-item">
                <strong>释义:</strong> <span id="tooltip-meaning"></span>
            </div>
            <div class="tooltip-item">
                <strong>词性:</strong> <span id="tooltip-pos"></span>
            </div>
            <div class="tooltip-item">
                <strong>音标:</strong> <span id="tooltip-phonetic"></span>
            </div>
            <div class="tooltip-item">
                <strong>例句:</strong> <span id="tooltip-example"></span>
            </div>
            <div class="tooltip-item">
                <strong>联想词:</strong> <span id="tooltip-related"></span>
            </div>
        </div>
    </div>
</body>
</html>
